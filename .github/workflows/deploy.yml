name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: ap-southeast-2
  ECR_REPOSITORY: devops-test-app
  ECS_CLUSTER: devops-test-cluster
  ECS_SERVICE: devops-test-service

permissions:
  id-token: write
  contents: read

jobs:
  # -----------------------------------------------------------
  # Job 1: Build Docker image and push to ECR
  # -----------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ github.sha }}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        working-directory: task2/app
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          IMAGE_URI="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}"
          IMAGE_LATEST="${ECR_REGISTRY}/${{ env.ECR_REPOSITORY }}:latest"

          docker build -t "${IMAGE_URI}" -t "${IMAGE_LATEST}" .
          docker push "${IMAGE_URI}"
          docker push "${IMAGE_LATEST}"

  # -----------------------------------------------------------
  # Job 2: Deploy infrastructure via Terraform
  # -----------------------------------------------------------
  deploy-infra:
    name: Deploy Infrastructure (Terraform)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform Init
        working-directory: task2/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: task2/terraform
        env:
          TF_VAR_image_tag: ${{ needs.build.outputs.image_tag }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        run: terraform apply -auto-approve

  # -----------------------------------------------------------
  # Job 3: Force new ECS deployment (rolling update)
  # -----------------------------------------------------------
  deploy-service:
    name: Deploy ECS Service
    runs-on: ubuntu-latest
    needs: [build, deploy-infra]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}
